<body class="bg-slate-100 text-slate-900 antialiased font-black">
    <div id="root"></div>

    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyC6sa4vhxMC2yv2kO9PKhdXtBSV3BhFD6Q",
            authDomain: "sistema-de-presupuestos-fsb.firebaseapp.com",
            projectId: "sistema-de-presupuestos-fsb",
            storageBucket: "sistema-de-presupuestos-fsb.firebasestorage.app",
            messagingSenderId: "365707535637",
            appId: "1:365707535637:web:e28ab3901a5f194e4df51c"
        };

        const APP_ID = 'maestranza-oficial';
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const { useState, useMemo, useEffect, useRef } = React;

        const formatDots = (val) => {
            if (val === undefined || val === null || val === "") return "";
            const num = val.toString().replace(/\D/g, "");
            return num.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        };

        const parseDots = (val) => {
            if (val === "" || val === null || val === undefined) return 0;
            return parseInt(val.toString().replace(/\./g, "")) || 0;
        };

        const NumericInput = ({ value, onChange, className, placeholder }) => {
            return (
                <input
                    type="text"
                    value={formatDots(value)}
                    placeholder={placeholder}
                    className={className}
                    onChange={(e) => onChange(parseDots(e.target.value))}
                />
            );
        };

        const AutoResizeTextarea = ({ value, onChange, placeholder, className, isTitle = false }) => {
            const areaRef = useRef(null);
            
            useEffect(() => {
                const el = areaRef.current;
                if (el) {
                    el.style.height = 'auto';
                    el.style.height = el.scrollHeight + 'px';
                }
            }, [value]);

            return (
                <div className="w-full">
                    <div className={`hidden print:block print-text text-left ${isTitle ? 'font-black uppercase text-[11px]' : 'font-medium italic text-[10px] text-slate-500'}`}>
                        {value || " "}
                    </div>
                    <textarea 
                        ref={areaRef} 
                        value={value} 
                        onChange={onChange} 
                        placeholder={placeholder}
                        spellCheck="true"
                        className={`${className} w-full block bg-transparent outline-none overflow-hidden print:hidden text-left`} 
                        rows="1" 
                    />
                </div>
            );
        };

        const SafeIcon = ({ name, size = 16, className = "" }) => {
            const Lib = window.lucide || {};
            const IconComp = Lib[name];
            if (!IconComp) return <span style={{ width: size, height: size }} className="inline-block"></span>;
            const iconSvg = IconComp.map(tag => {
                const [tagName, attributes] = tag;
                return React.createElement(tagName, attributes);
            });
            return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{iconSvg}</svg>;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [status, setStatus] = useState("checking");
            const [loginEmail, setLoginEmail] = useState("");
            const [loginPassword, setLoginPassword] = useState("");
            const [loginError, setLoginError] = useState("");

            const [msg, setMsg] = useState(null);
            const [savedBudgets, setSavedBudgets] = useState([]);
            const [savedClients, setSavedClients] = useState([]);
            const [openFolders, setOpenFolders] = useState({});
            const [showSaveConfirmModal, setShowSaveConfirmModal] = useState(false);
            const [showClientList, setShowClientList] = useState(false);
            const [expandedCosts, setExpandedCosts] = useState({});

            const [vistaActiva, setVistaActiva] = useState('presupuestos');
            const [savedRemisiones, setSavedRemisiones] = useState([]);
            const [openRemisionesFolders, setOpenRemisionesFolders] = useState({});

            const [empresa, setEmpresa] = useState({
                nombre: "BOLPAR COMUNICACIONES",
                ruc: "3226502-6",
                direccion: "LIONEL TELMO GONZÁLEZ ARCE LUQUE - PARAGUAY",
                telefono: "0985 293 177",
                email: "INGENIERIADEPROYECTOSPY@GMAIL.COM"
            });

            const [nroPresupuesto, setNroPresupuesto] = useState("");
            const [estado, setEstado] = useState("pendiente");
            const [cliente, setCliente] = useState({ nombre: "", ruc: "", direccion: "", atencion: "" });
            
            const [items, setItems] = useState([{ 
                id: Date.now(), 
                titulo: "", 
                detalles: "", 
                cantidad: 1, 
                precioUnitario: 0,
                pesoKg: 0,
                precioKg: 0,
                insumos: 0,
                diasTrabajados: 0,
                costoDia: 250000, 
                margenDeseado: 30 
            }]);

            const [condiciones, setCondiciones] = useState("Plazo de entrega: A convenir.\nForma de pago: 60% entrega inicial y saldo contra entrega.");

            const [nroRemision, setNroRemision] = useState("");
            const [remisionDatos, setRemisionDatos] = useState({
                fechaEmision: new Date().toISOString().split('T')[0],
                fechaTraslado: new Date().toISOString().split('T')[0],
                comprobanteVenta: "", 
                facturaManual: "",     
                motivoTraslado: "VENTA",
                conductorNombre: "",
                conductorRuc: "",
                vehiculoChapa: "",
                marcaVehiculo: "",
                puntoPartida: "LIONEL TELMO GONZÁLEZ ARCE LUQUE - PARAGUAY",
                puntoLlegada: ""
            });
            const [remisionItems, setRemisionItems] = useState([{
                id: Date.now(),
                descripcion: "",
                cantidad: 1,
                indigoMedida: "UNIDAD",
                pesoTotalKg: 0
            }]);

            const showMsg = (text) => { setMsg(text); setTimeout(() => setMsg(null), 5000); };

            const generarNro = (lista) => {
                const year = new Date().getFullYear();
                const prefix = `PR-${year}.`;
                const filtrados = lista.filter(b => b.nroPresupuesto?.startsWith(prefix));
                let maxNum = 0;
                filtrados.forEach(b => {
                    const parts = b.nroPresupuesto.split('.');
                    if (parts.length > 1) {
                        const num = parseInt(parts[1]);
                        if (!isNaN(num) && num > maxNum) maxNum = num;
                    }
                });
                return `${prefix}${(maxNum + 1).toString().padStart(4, '0')}`;
            };

            const generarNroRemision = (lista) => {
                const prefix = "001-001-";
                let maxNum = 0;
                lista.forEach(r => {
                    if (r.nroRemision?.startsWith(prefix)) {
                        const numStr = r.nroRemision.replace(prefix, "");
                        const num = parseInt(numStr);
                        if (!isNaN(num) && num > maxNum) maxNum = num;
                    }
                });
                return `${prefix}${(maxNum + 1).toString().padStart(7, '0')}`;
            };

            useEffect(() => {
                const unsubscribeAuth = auth.onAuthStateChanged((firebaseUser) => {
                    if (firebaseUser) {
                        setUser(firebaseUser);
                        setStatus("online");
                    } else {
                        setUser(null);
                        setStatus("offline");
                    }
                });
                return () => unsubscribeAuth();
            }, []);

            useEffect(() => {
                if (!user) return;
                
                const path = `artifacts/${APP_ID}/public/data/presupuestos`;
                const unsub = db.collection(path).onSnapshot(snap => {
                    const docs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setSavedBudgets(docs.sort((a,b) => (b.updatedAt || 0) - (a.updatedAt || 0)));
                }, () => setStatus("offline"));

                const unsubC = db.collection(`artifacts/${APP_ID}/public/data/clientes`).onSnapshot(snap => {
                    setSavedClients(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                const unsubR = db.collection(`artifacts/${APP_ID}/public/data/remisiones`).onSnapshot(snap => {
                    const docs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setSavedRemisiones(docs.sort((a,b) => (b.updatedAt || 0) - (a.updatedAt || 0)));
                });

                return () => { unsub(); unsubC(); unsubR(); };
            }, [user]);

            useEffect(() => {
                if (savedBudgets.length > 0 && !nroPresupuesto) {
                    setNroPresupuesto(generarNro(savedBudgets));
                }
            }, [savedBudgets]);

            useEffect(() => {
                if (savedRemisiones.length > 0 && !nroRemision) {
                    setNroRemision(generarNroRemision(savedRemisiones));
                }
            }, [savedRemisiones]);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoginError("");
                try {
                    const cred = await auth.signInWithEmailAndPassword(loginEmail, loginPassword);
                    setUser(cred.user);
                    setStatus("online");
                    showMsg("🔓 Sesión Iniciada");
                } catch (err) {
                    setLoginError("Acceso denegado. Revisa tu configuración en Firebase.");
                }
            };

            const handleLogout = () => {
                auth.signOut().then(() => {
                    setUser(null);
                    setStatus("offline");
                });
            };

            const suggestedClients = useMemo(() => {
                if (!cliente.nombre || cliente.nombre.length < 1) return [];
                return savedClients.filter(c => c.nombre.toLowerCase().includes(cliente.nombre.toLowerCase())).slice(0, 5);
            }, [cliente.nombre, savedClients]);

            const groupedBudgets = useMemo(() => {
                return savedBudgets.reduce((acc, b) => {
                    const folder = b.cliente?.nombre || "Sin Nombre";
                    if (!acc[folder]) acc[folder] = [];
                    acc[folder].push(b);
                    return acc;
                }, {});
            }, [savedBudgets]);

            const groupedRemisiones = useMemo(() => {
                return savedRemisiones.reduce((acc, r) => {
                    const folder = r.cliente?.nombre || "Sin Nombre";
                    if (!acc[folder]) acc[folder] = [];
                    acc[folder].push(r);
                    return acc;
                }, {});
            }, [savedRemisiones]);

            const totales = useMemo(() => {
                let totalVenta = 0;
                let totalCostoReal = 0;

                items.forEach(item => {
                    const cant = Number(item.cantidad) || 0;
                    totalVenta += cant * (Number(item.precioUnitario) || 0);
                    
                    const costoMat = (Number(item.pesoKg) || 0) * (Number(item.precioKg) || 0);
                    const costoMO = (Number(item.diasTrabajados) || 0) * (Number(item.costoDia) || 0);
                    const costoItem = costoMat + costoMO + (Number(item.insumos) || 0);
                    totalCostoReal += cant * costoItem;
                });

                const neto = Math.round(totalVenta / 1.1);
                const iva = totalVenta - neto;

                return { neto, iva, total: totalVenta, costoTotal: totalCostoReal, margenActual: totalVenta > 0 ? ((totalVenta - totalCostoReal) / totalVenta) * 100 : 0 };
            }, [items]);

            const executeSave = async (targetNro) => {
                try {
                    const docId = targetNro.replace(/\s+/g, '-').toLowerCase();
                    await db.doc(`artifacts/${APP_ID}/public/data/presupuestos/${docId}`).set({
                        empresa, nroPresupuesto: targetNro, estado, cliente, items, condiciones, 
                        updatedAt: Date.now(), total: totales.total, costoTotal: totales.costoTotal 
                    });
                    const clientId = cliente.nombre.replace(/\s+/g, '-').toLowerCase();
                    await db.doc(`artifacts/${APP_ID}/public/data/clientes/${clientId}`).set({ ...cliente, updatedAt: Date.now() });
                    showMsg("✅ Guardado y Sincronizado");
                    setShowSaveConfirmModal(false);
                } catch (e) { showMsg("❌ Error Firebase"); } 
            };

            const executeSaveRemision = async () => {
                try {
                    const docId = nroRemision.replace(/\s+/g, '-').toLowerCase();
                    await db.doc(`artifacts/${APP_ID}/public/data/remisiones/${docId}`).set({
                        empresa, nroRemision, cliente, remisionDatos, items: remisionItems,
                        updatedAt: Date.now()
                    });
                    const clientId = cliente.nombre.replace(/\s+/g, '-').toLowerCase();
                    await db.doc(`artifacts/${APP_ID}/public/data/clientes/${clientId}`).set({ ...cliente, updatedAt: Date.now() });
                    showMsg("✅ Nota de Remisión Guardada");
                } catch (e) { showMsg("❌ Error Firebase"); }
            };

            const importarPresupuestoARemision = (presu) => {
                setCliente(presu.cliente);
                setRemisionDatos(prev => ({
                    ...prev,
                    puntoLlegada: presu.cliente.direccion || "",
                    comprobanteVenta: presu.nroPresupuesto || ""
                }));
                const nuevosItems = presu.items.map(it => ({
                    id: Date.now() + Math.random(),
                    descripcion: `${it.titulo} - ${it.detalles}`.substring(0, 100),
                    cantidad: it.cantidad,
                    indigoMedida: "UNIDAD",
                    pesoTotalKg: it.pesoKg * it.cantidad || 0
                }));
                setRemisionItems(nuevosItems);
                showMsg("✅ Datos importados de " + presu.nroPresupuesto);
            };

            const handleComprobanteVentaChange = (val) => {
                setRemisionDatos(prev => ({ ...prev, comprobanteVenta: val }));
                const presuEncontrado = savedBudgets.find(
                    b => b.nroPresupuesto.trim().toLowerCase() === val.trim().toLowerCase()
                );
                if (presuEncontrado) importarPresupuestoARemision(presuEncontrado);
            };

            const handleFacturaManualChange = (val) => {
                setRemisionDatos(prev => ({ ...prev, facturaManual: val }));
                const remisionConFactura = savedRemisiones.find(
                    r => r.remisionDatos?.facturaManual?.trim().toLowerCase() === val.trim().toLowerCase()
                );
                if (remisionConFactura) {
                    setCliente(remisionConFactura.cliente);
                    setRemisionItems(remisionConFactura.items);
                    setRemisionDatos(prev => ({
                        ...prev,
                        puntoLlegada: remisionConFactura.cliente?.direccion || "",
                        conductorNombre: remisionConFactura.remisionDatos?.conductorNombre || "",
                        conductorRuc: remisionConFactura.remisionDatos?.conductorRuc || "",
                        vehiculoChapa: remisionConFactura.remisionDatos?.vehiculoChapa || "",
                        marcaVehiculo: remisionConFactura.remisionDatos?.marcaVehiculo || ""
                    }));
                    showMsg("⚡ Datos estirados desde Factura Manual " + val);
                }
            };

            const formatMoneda = (val) => new Intl.NumberFormat('es-PY', { style: 'currency', currency: 'PYG', minimumFractionDigits: 0 }).format(val);
            
            const actualizarItem = (id, campo, valor) => {
                setItems(prevItems => prevItems.map(item => {
                    if (item.id === id) {
                        const updated = { ...item, [campo]: valor };
                        
                        const peso = campo === 'pesoKg' ? Number(valor) : (Number(updated.pesoKg) || 0);
                        const precioKg = campo === 'precioKg' ? Number(valor) : (Number(updated.precioKg) || 0);
                        const insumos = campo === 'insumos' ? Number(valor) : (Number(updated.insumos) || 0);
                        const dias = campo === 'diasTrabajados' ? Number(valor) : (Number(updated.diasTrabajados) || 0);
                        const costoDia = campo === 'costoDia' ? Number(valor) : (Number(updated.costoDia) || 0);
                        const margen = campo === 'margenDeseado' ? Number(valor) : (Number(updated.margenDeseado) || 30);

                        const costoUnitarioDirecto = (peso * precioKg) + (dias * costoDia) + insumos;
                        
                        if (['pesoKg', 'precioKg', 'insumos', 'diasTrabajados', 'costoDia', 'margenDeseado'].includes(campo)) {
                            updated.precioUnitario = Math.round(costoUnitarioDirecto / (1 - (margen / 100)));
                        }
                        
                        return updated;
                    }
                    return item;
                }));
            };
            
            const actualizarRemisionItem = (id, campo, valor) => {
                setRemisionItems(remisionItems.map(i => i.id === id ? { ...i, [campo]: valor } : i));
            };

            if (!user) {
                return (
                    <div className="min-h-screen bg-slate-900 flex items-center justify-center p-6 text-white font-black">
                        <div className="bg-slate-800 border-2 border-slate-700 p-8 rounded-[2.5rem] shadow-2xl max-w-md w-full space-y-6 text-left fade-in">
                            <div className="text-center">
                                <div className="w-16 h-16 bg-indigo-600 rounded-3xl flex items-center justify-center mx-auto text-white mb-4 shadow-lg"><SafeIcon name="Lock" size={32}/></div>
                                <h1 className="text-xl font-black uppercase tracking-wider font-black">Sistema de Presupuesto</h1>
                                <p className="text-[10px] text-slate-400 uppercase tracking-widest mt-1">Ingreso Protegido</p>
                            </div>

                            <form onSubmit={handleLogin} className="space-y-4">
                                <div className="flex flex-col">
                                    <label className="text-[9px] uppercase tracking-wider text-slate-400 mb-1">Correo Electrónico</label>
                                    <input type="email" required className="bg-slate-950 border border-slate-700 rounded-xl px-4 py-2.5 text-xs outline-none focus:border-indigo-500 font-mono" value={loginEmail} onChange={e => setLoginEmail(e.target.value)} placeholder="correo@ejemplo.com"/>
                                </div>
                                <div className="flex flex-col">
                                    <label className="text-[9px] uppercase tracking-wider text-slate-400 mb-1">Contraseña</label>
                                    <input type="password" required className="bg-slate-950 border border-slate-700 rounded-xl px-4 py-2.5 text-xs outline-none focus:border-indigo-500 font-mono" value={loginPassword} onChange={e => setLoginPassword(e.target.value)} placeholder="••••••••"/>
                                </div>
                                {loginError && <div className="bg-rose-500/10 border border-rose-500/30 text-rose-400 p-3 rounded-xl text-[10px] uppercase font-bold text-center">{loginError}</div>}
                                <button type="submit" className="w-full py-3 bg-indigo-600 hover:bg-indigo-700 transition-all rounded-xl text-xs uppercase font-black tracking-widest text-white shadow-xl">Ingresar</button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-10 bg-slate-100 flex flex-col items-center">
                    {/* MENÚ SUPERIOR */}
                    <nav className="w-full sticky top-0 z-50 bg-white border-b border-slate-200 px-6 py-2 no-print flex items-center justify-between shadow-sm font-black">
                        <div className="flex items-center gap-6">
                            <div className="text-left">
                                <h1 className="text-sm font-black text-slate-900 uppercase tracking-tighter">Sistema de Presupuesto 1.0</h1>
                                <div className="flex items-center gap-1.5 mt-0.5 uppercase text-[8px] text-slate-400 font-bold">
                                    <div className="w-1.5 h-1.5 rounded-full bg-emerald-500"></div>
                                    Conectado ({user.email})
                                </div>
                            </div>
                            <div className="flex gap-2 border-l border-slate-200 pl-4">

                                                </tbody>
                                            </table>
                                            <button onClick={() => setItems([...items, {id: Date.now(), titulo:"", detalles:"", cantidad:1, precioUnitario:0, pesoKg:0, precioKg:0, insumos:0, diasTrabajados:0, costoDia:250000, margenDeseado:30}])} className="mt-4 no-print bg-slate-900 text-white px-4 py-2 rounded-xl text-[9px] uppercase shadow flex items-center gap-2"><SafeIcon name="Plus" size={14}/> Agregar Trabajo</button>
                                        </div>

                                        {/* PIE DE PRESUPUESTO */}
                                        <div className="mt-auto text-left print-no-break pt-4 border-t border-slate-900">
                                            <div className="w-full h-[1.3cm] min-h-[50px] mb-4 text-white rounded-lg shadow flex items-center px-6 print-header-dark print-h-box bg-[#0f172a]">
                                                <div className="flex-1 flex gap-8">
                                                    <div className="flex flex-col"><span className="text-[9px] uppercase opacity-60">Subtotal Neto</span><span className="text-xs font-mono font-black">{formatMoneda(totales.neto)}</span></div>
                                                    <div className="flex flex-col"><span className="text-[9px] uppercase opacity-60">IVA Incl. (10%)</span><span className="text-xs font-mono font-black">{formatMoneda(totales.iva)}</span></div>
                                                </div>
                                                <div className="text-right">
                                                    <span className="text-[10px] uppercase opacity-85 block">Total General</span>
                                                    <span className="text-xl font-black font-mono">{formatMoneda(totales.total)}</span>
                                                </div>
                                            </div>
                                            
                                            {/* SECCIÓN CORREGIDA DE CONDICIONES COMERCIALES */}
                                            <div className="w-full mb-6">
                                                <h3 className="text-[9px] font-black text-slate-400 uppercase flex items-center gap-1.5"><SafeIcon name="CreditCard" size={10} className="text-indigo-600" /> Condiciones</h3>
                                                <textarea spellCheck="true" className="w-full min-h-12 p-3 bg-slate-50 border rounded-xl text-[10px] text-slate-600 outline-none print:hidden" value={condiciones} onChange={e => setCondiciones(e.target.value)}/>
                                                {/* Contenedor fluido exclusivo para que el papel salte de línea de forma automática */}
                                                <div className="hidden print:block print-text text-[10px] text-slate-800 leading-relaxed w-full max-w-full break-words whitespace-pre-wrap pt-1">
                                                    {condiciones}
                                                </div>
                                            </div>
                                            
                                            <div className="table-layout-fixed w-full pt-6 text-center print-signature-row">
                                                <div className="table-row">
                                                    <div className="table-cell" style={{ width: '50%', padding: '0 40px' }}><div className="border-t border-slate-300 w-full mb-1"></div><p className="text-[9px] uppercase font-black">Emisor</p><p className="text-[7px] text-slate-400 font-bold uppercase">{empresa.nombre}</p></div>
                                                    <div className="table-cell" style={{ width: '50%', padding: '0 40px' }}><div className="border-t border-slate-300 w-full mb-1"></div><p className="text-[9px] uppercase font-black">Cliente</p><p className="text-[7px] text-slate-400 font-bold uppercase">{cliente.nombre || "Conformidad"}</p></div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* PESTAÑA: NOTA DE REMISIÓN COMPACTADA */}
                            {vistaActiva === 'remisiones' && (
                                <div className="bg-white shadow-2xl border border-slate-200 print-full flex flex-col min-h-[1050px] rounded-b-3xl overflow-hidden font-black animate-fadeIn">
                                    <div className="p-6 md:p-8 flex-1 flex flex-col font-black">
                                        
                                        {/* ENCABEZADO */}
                                        <div className="table-layout-fixed w-full border-b-2 border-slate-900 pb-4 mb-6 text-left font-black">
                                            <div className="table-row">
                                                <div className="table-cell" style={{ width: '60%' }}>
                                                    <div className="flex items-start gap-4">
                                                        <div className="w-12 h-12 bg-slate-900 rounded-2xl flex items-center justify-center text-white shadow-xl"><SafeIcon name="Truck" size={28}/></div>
                                                        <div className="space-y-0.5 text-slate-900 font-black">
                                                            <p className="text-xl uppercase tracking-tight leading-none font-black">{empresa.nombre}</p>
                                                            <div className="text-slate-500 text-[9px] font-bold uppercase leading-tight">
                                                                <div>RUC: {empresa.ruc} | {empresa.direccion}</div>
                                                                <div>Tel: {empresa.telefono}</div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="table-cell text-right" style={{ width: '40%' }}>
                                                    <div className="flex flex-col items-end">
                                                        <div className="header-tab bg-amber-600 !py-1 !px-5 text-[10px]">Nota de Remisión</div>
                                                        <div className="header-box !py-2 !px-4 min-w-[200px] text-right border-amber-600">
                                                            <label className="text-[8px] text-slate-400 font-black uppercase block tracking-widest mb-0.5">Nro.</label>
                                                            <input className="text-base font-mono font-black text-right outline-none w-full bg-transparent" value={nroRemision} onChange={e => setNroRemision(e.target.value)}/>
                                                            <p className="text-[9px] text-slate-800 font-mono text-right mt-0.5">{new Date().toLocaleDateString('es-PY', {day:'numeric', month:'long', year:'numeric'})}</p>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        {/* CLIENTE Y TRASLADO */}
                                        <div className="mb-6 bg-slate-50 rounded-2xl border border-slate-200 p-5 text-left print-bg-slate font-black print-compact-box">
                                            <div className="table-layout-fixed w-full">
                                                <div className="table-row">
                                                    
                                                    {/* Destinatario */}
                                                    <div className="table-cell pr-6" style={{ width: '50%', borderRight: '1px solid #e2e8f0' }}>
                                                        <h3 className="text-[9px] text-amber-600 uppercase flex items-center gap-2 tracking-[0.15em] mb-3"><SafeIcon name="User" size={10} /> Destinatario</h3>
                                                        <div className="space-y-2 relative">
                                                            <div className="flex flex-col">
                                                                <label className="text-[8px] text-slate-400 uppercase font-black">Cliente</label>
                                                                <input className="w-full text-xs font-black text-slate-900 bg-white/70 px-2 py-1 rounded-lg border outline-none" value={cliente.nombre} onFocus={() => setShowClientList(true)} onChange={e => { setCliente({...cliente, nombre: e.target.value}); setShowClientList(true); }}/>
                                                                {showClientList && suggestedClients.length > 0 && (
                                                                    <div className="absolute top-full left-0 w-full mt-1 bg-white border border-slate-200 rounded-xl shadow-xl z-50 overflow-hidden no-print">
                                                                        {suggestedClients.map(c => (
                                                                            <div key={c.id} onClick={() => { setCliente({ nombre: c.nombre, ruc: c.ruc || "", direccion: c.direccion || "", atencion: c.atencion || "" }); setShowClientList(false); }} className="p-2 hover:bg-amber-50 cursor-pointer border-b last:border-0 text-left"><p className="text-xs font-black uppercase text-slate-900">{c.nombre}</p></div>
                                                                        ))}
                                                                    </div>
                                                                )}
                                                            </div>
                                                            <div className="flex flex-col"><label className="text-[8px] text-slate-400 uppercase font-black">RUC</label><input className="w-full text-xs font-black bg-white/50 px-2 py-0.5 rounded border" value={cliente.ruc} onChange={e => setCliente({...cliente, ruc: e.target.value})}/></div>
                                                            <div className="flex flex-col"><label className="text-[8px] text-slate-400 uppercase font-black">Entrega</label><input className="w-full text-xs font-black bg-white/50 px-2 py-0.5 rounded border" value={cliente.direccion} onChange={e => setCliente({...cliente, direccion: e.target.value})}/></div>
                                                        </div>
                                                    </div>

                                                    {/* Traslado */}
                                                    <div className="table-cell pl-6" style={{ width: '50%' }}>
                                                        <h3 className="text-[9px] text-amber-600 uppercase flex items-center gap-2 tracking-[0.15em] mb-3"><SafeIcon name="MapPin" size={10} /> Traslado</h3>
                                                        <div className="grid grid-cols-2 gap-2">
                                                            <div className="flex flex-col"><label className="text-[8px] text-slate-400 uppercase font-black">Emisión</label><input type="date" className="w-full text-xs font-black bg-white/50 px-2 py-0.5 border rounded" value={remisionDatos.fechaEmision} onChange={e => setRemisionDatos({...remisionDatos, fechaEmision: e.target.value})}/></div>
                                                            <div className="flex flex-col"><label className="text-[8px] text-slate-400 uppercase font-black">Inicio</label><input type="date" className="w-full text-xs font-black bg-white/50 px-2 py-0.5 border rounded" value={remisionDatos.fechaTraslado} onChange={e => setRemisionDatos({...remisionDatos, fechaTraslado: e.target.value})}/></div>
                                                            <div className="flex flex-col"><label className="text-[8px] text-slate-400 uppercase font-black">Motivo</label><input className="w-full text-xs font-black bg-white/50 px-2 py-0.5 border rounded" value={remisionDatos.motivoTraslado} onChange={e => setRemisionDatos({...remisionDatos, motivoTraslado: e.target.value})}/></div>
                                                            
                                                            <div className="flex flex-col">
                                                                <span className="dev-label text-[8px] text-amber-500 font-bold uppercase flex items-center gap-0.5"><SafeIcon name="Zap" size={8} /> Presupuesto (Carga Auto)</span>
                                                                <span className="clean-print-label hidden">Nro. Presupuesto</span>
                                                                <input className="w-full text-xs font-black bg-amber-50 border-amber-200 border px-2 py-0.5 rounded" value={remisionDatos.comprobanteVenta} onChange={e => handleComprobanteVentaChange(e.target.value)} placeholder="Ej: PR-2026.0001"/>
                                                            </div>

                                                            <div className="flex flex-col col-span-2 mt-1">
                                                                <span className="dev-label text-[8px] text-emerald-600 font-bold uppercase flex items-center gap-0.5"><SafeIcon name="FileText" size={8} /> Factura Manual (Carga Auto)</span>
                                                                <span className="clean-print-label hidden">Nº Factura Manual</span>
                                                                <input className="w-full text-xs font-black bg-emerald-50 border-emerald-200 border px-2 py-1 rounded-lg" value={remisionDatos.facturaManual} onChange={e => handleFacturaManualChange(e.target.value)} placeholder="Ej: 001-002-0004321"/>
                                                            </div>
                                                        </div>
                                                    </div>

                                                </div>
                                            </div>
                                        </div>

                                        {/* CONDUCTOR Y VEHÍCULO */}
                                        <div className="mb-6 bg-slate-50 rounded-2xl border border-slate-200 p-5 text-left print-bg-slate font-black print-compact-box">
                                            <h3 className="text-[9px] text-amber-600 uppercase flex items-center gap-2 tracking-[0.15em] mb-3"><SafeIcon name="Truck" size={10} /> Transporte y Conductor</h3>
                                            <div className="grid grid-cols-1 md:grid-cols-4 gap-3">
                                                <div className="flex flex-col"><label className="text-[8px] text-slate-400 uppercase font-black">Conductor</label><input className="w-full text-xs font-black bg-white/70 px-2 py-1 rounded-lg border" value={remisionDatos.conductorNombre} onChange={e => setRemisionDatos({...remisionDatos, conductorNombre: e.target.value})}/></div>
                                                <div className="flex flex-col"><label className="text-[8px] text-slate-400 uppercase font-black">Documento</label><input className="w-full text-xs font-black bg-white/70 px-2 py-1 rounded-lg border" value={remisionDatos.conductorRuc} onChange={e => setRemisionDatos({...remisionDatos, conductorRuc: e.target.value})}/></div>
                                                <div className="flex flex-col"><label className="text-[8px] text-slate-400 uppercase font-black">Chapa</label><input className="w-full text-xs font-black bg-white/70 px-2 py-1 rounded-lg border" value={remisionDatos.vehiculoChapa} onChange={e => setRemisionDatos({...remisionDatos, vehiculoChapa: e.target.value})}/></div>
                                                <div className="flex flex-col"><label className="text-[8px] text-slate-400 uppercase font-black">Modelo</label><input className="w-full text-xs font-black bg-white/70 px-2 py-1 rounded-lg border" value={remisionDatos.marcaVehiculo} onChange={e => setRemisionDatos({...remisionDatos, marcaVehiculo: e.target.value})}/></div>
                                            </div>
                                        </div>

                                        {/* TABLA DE ELEMENTOS A REMITIR */}
                                        <div className="mb-6 flex-1">
                                            <table className="w-full border-collapse">
                                                <thead>
                                                    <tr className="border-b border-slate-900 text-slate-900 uppercase text-[9px] tracking-widest">
                                                        <th className="py-2 w-8 text-center">#</th>
                                                        <th className="py-2 pl-2 text-left" style={{ width: '60%' }}>Bienes a Remitir</th>
                                                        <th className="py-2 w-20 text-center">Cant.</th>
                                                        <th className="py-2 w-24 text-center">Unidad</th>
                                                        <th className="py-2 w-28 text-right pr-2">Peso (KG)</th>
                                                        <th className="py-2 w-8 no-print"></th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100 text-[11px]">
                                                    {remisionItems.map((item, idx) => (
                                                        <tr key={item.id} className="align-top print-no-break print-compact-py">
                                                            <td className="py-2 text-[10px] text-slate-400 font-mono text-center pt-3">{idx + 1}</td>
                                                            <td className="py-2 pl-2 pr-4 pt-2">
                                                                <AutoResizeTextarea isTitle={true} placeholder="Estructura..." value={item.descripcion} className="flex-1 font-black text-slate-900 text-[11px] uppercase tracking-tight" onChange={e => actualizarRemisionItem(item.id, 'descripcion', e.target.value)}/>
                                                            </td>
                                                            <td className="py-2 pt-3 text-center px-1">
                                                                <input type="number" className="w-full text-center outline-none bg-transparent font-mono" value={item.cantidad} onChange={e => actualizarRemisionItem(item.id, 'cantidad', parseFloat(e.target.value) || 0)}/>
                                                            </td>
                                                            <td className="py-2 pt-3 text-center px-1">
                                                                <input className="w-full text-center outline-none bg-transparent uppercase" value={item.indigoMedida} onChange={e => actualizarRemisionItem(item.id, 'indigoMedida', e.target.value)}/>
                                                            </td>
                                                            <td className="py-2 pt-3 pr-2 text-right font-mono">
                                                                <input type="number" className="w-full text-right outline-none bg-transparent font-mono" value={item.pesoTotalKg} onChange={e => actualizarRemisionItem(item.id, 'pesoTotalKg', parseFloat(e.target.value) || 0)}/>
                                                            </td>
                                                            <td className="py-2 text-center no-print pt-3">
                                                                <button onClick={() => setRemisionItems(remisionItems.filter(it => it.id !== item.id))} className="text-slate-200 hover:text-rose-500"><SafeIcon name="Trash2" size={14}/></button>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                            <button onClick={() => setRemisionItems([...remisionItems, {id: Date.now(), descripcion:"", cantidad:1, indigoMedida:"UNIDAD", pesoTotalKg:0}])} className="mt-4 no-print bg-amber-600 text-white px-4 py-2 rounded-xl text-[9px] uppercase shadow flex items-center gap-2"><SafeIcon name="Plus" size={14}/> Agregar Ítem</button>
                                        </div>

                                        {/* PIE DE FIRMAS */}
                                        <div className="mt-auto text-left print-no-break pt-4 border-t border-slate-900">
                                            <div className="table-layout-fixed w-full pt-10 text-center print-signature-row">
                                                <div className="table-row">
                                                    <div className="table-cell" style={{ width: '33%', padding: '0 15px' }}><div className="border-t border-slate-300 w-full mb-1"></div><p className="text-[9px] uppercase font-black">Emisor</p><p className="text-[7px] text-slate-400 font-bold uppercase">Despacho</p></div>
                                                    <div className="table-cell" style={{ width: '33%', padding: '0 15px' }}><div className="border-t border-slate-300 w-full mb-1"></div><p className="text-[9px] uppercase font-black">Transportista</p><p className="text-[7px] text-slate-400 font-bold uppercase">Conductor</p></div>
                                                    <div className="table-cell" style={{ width: '33%', padding: '0 15px' }}><div className="border-t border-slate-300 w-full mb-1"></div><p className="text-[9px] uppercase font-black">Receptor</p><p className="text-[7px] text-slate-400 font-bold uppercase">Conformidad Obra</p></div>
                                                </div>
                                            </div>
                                        </div>

                                    </div>
                                </div>
                            )}

                        </main>
                    </div>

                    {/* MODAL DE ADVERTENCIA */}
                    {showSaveConfirmModal && (
                        <div className="fixed inset-0 z-[110] bg-slate-900/70 backdrop-blur-md flex items-center justify-center p-6 no-print font-black">
                            <div className="bg-white p-8 rounded-[2rem] shadow-2xl max-w-md w-full text-center space-y-6">
                                <div className="w-16 h-16 bg-amber-50 text-amber-500 rounded-full flex items-center justify-center mx-auto"><SafeIcon name="AlertCircle" size={32}/></div>
                                <div><h3 className="font-black uppercase text-sm tracking-widest text-slate-800">Documento ya existe</h3><p className="text-[10px] text-slate-500 font-bold mt-2 uppercase font-black font-black font-black">¿Deseas actualizar el presupuesto {nroPresupuesto} o guardar una copia nueva?</p></div>
                                <div className="grid grid-cols-1 gap-3 font-black">
                                    <button onClick={() => executeSave(nroPresupuesto)} className="py-4 bg-indigo-600 text-white rounded-xl text-[10px] font-black">Actualizar Existente</button>
                                    <button onClick={() => executeSave(generarNro(savedBudgets))} className="py-4 bg-slate-800 text-white rounded-xl text-[10px] font-black">Guardar como Nuevo</button>
                                    <button onClick={() => setShowSaveConfirmModal(false)} className="py-2 text-[10px] font-black text-slate-400">Cancelar</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
