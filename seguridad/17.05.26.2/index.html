<body class="antialiased font-black selection:bg-cyan-500 selection:text-slate-950">
    <div id="root"></div>

    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyC6sa4vhxMC2yv2kO9PKhdXtBSV3BhFD6Q",
            authDomain: "sistema-de-presupuestos-fsb.firebaseapp.com",
            projectId: "sistema-de-presupuestos-fsb",
            storageBucket: "sistema-de-presupuestos-fsb.firebasestorage.app",
            messagingSenderId: "365707535637",
            appId: "1:365707535637:web:e28ab3901a5f194e4df51c"
        };

        const APP_ID = 'maestranza-oficial';
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const { useState, useMemo, useEffect, useRef } = React;

        const formatMoneda = (val) => new Intl.NumberFormat('es-PY', { style: 'currency', currency: 'PYG', minimumFractionDigits: 0 }).format(val);

        const formatDots = (val) => {
            if (val === undefined || val === null || val === "") return "";
            const num = val.toString().replace(/\D/g, "");
            return num.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        };

        const parseDots = (val) => {
            if (val === "" || val === null || val === undefined) return 0;
            return parseInt(val.toString().replace(/\./g, "")) || 0;
        };

        const NumericInput = ({ value, onChange, className, placeholder }) => {
            return (
                <input
                    type="text"
                    value={formatDots(value)}
                    placeholder={placeholder}
                    className={className}
                    onChange={(e) => onChange(parseDots(e.target.value))}
                />
            );
        };

        const AutoResizeTextarea = ({ value, onChange, placeholder, className, isTitle = false }) => {
            const areaRef = useRef(null);
            
            useEffect(() => {
                const el = areaRef.current;
                if (el) {
                    el.style.height = 'auto';
                    el.style.height = el.scrollHeight + 'px';
                }
            }, [value]);

            return (
                <div className="w-full">
                    <div className={`hidden print:block print-text text-left ${isTitle ? 'font-black uppercase text-[11px]' : 'font-medium italic text-[10px] text-slate-500'}`}>
                        {value || " "}
                    </div>
                    <textarea 
                        ref={areaRef} 
                        value={value} 
                        onChange={onChange} 
                        placeholder={placeholder}
                        spellCheck="true"
                        className={`${className} w-full block bg-transparent outline-none overflow-hidden print:hidden text-left`} 
                        rows="1" 
                    />
                </div>
            );
        };

        const SafeIcon = ({ name, size = 16, className = "" }) => {
            const Lib = window.lucide || {};
            const IconComp = Lib[name];
            if (!IconComp) return <span style={{ width: size, height: size }} className="inline-block"></span>;
            const iconSvg = IconComp.map(tag => {
                const [tagName, attributes] = tag;
                return React.createElement(tagName, attributes);
            });
            return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{iconSvg}</svg>;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [status, setStatus] = useState("checking");
            const [loginEmail, setLoginEmail] = useState("");
            const [loginPassword, setLoginPassword] = useState("");
            const [loginError, setLoginError] = useState("");

            const [msg, setMsg] = useState(null);
            const [savedBudgets, setSavedBudgets] = useState([]);
            const [savedClients, setSavedClients] = useState([]);
            
            // NUEVO ESTADO: Colección de Empresas Guardadas para Opción B
            const [savedEmpresas, setSavedEmpresas] = useState([]);
            const [showEmpresaList, setShowEmpresaList] = useState(false);
            
            const [openFolders, setOpenFolders] = useState({});
            const [showSaveConfirmModal, setShowSaveConfirmModal] = useState(false);
            const [showClientList, setShowClientList] = useState(false);
            const [expandedCosts, setExpandedCosts] = useState({});

            const [vistaActiva, setVistaActiva] = useState('dashboard');
            const [savedRemisiones, setSavedRemisiones] = useState([]);
            const [openRemisionesFolders, setOpenRemisionesFolders] = useState({});

            const [empresa, setEmpresa] = useState({
                nombre: "BOLPAR COMUNICACIONES",
                ruc: "3226502-6",
                direccion: "LIONEL TELMO GONZÁLEZ ARCE LUQUE - PARAGUAY",
                telefono: "0985 293 177",
                email: "INGENIERIADEPROYECTOSPY@GMAIL.COM",
                logoUrl: ""
            });

            const [nroPresupuesto, setNroPresupuesto] = useState("");
            const [estado, setEstado] = useState("pendiente");
            const [cliente, setCliente] = useState({ nombre: "", ruc: "", direccion: "", atencion: "", vendedor: "", telefono: "", email: "" });
            
            const [items, setItems] = useState([{ 
                id: Date.now(), 
                titulo: "", 
                detalles: "", 
                cantidad: 1, 
                precioUnitario: 0,
                pesoKg: 0,
                precioKg: 0,
                insumos: 0,
                diasTrabajados: 0,
                costoDia: 250000, 
                margenDeseado: 30 
            }]);

            const [condiciones, setCondiciones] = useState("Plazo de entrega: A convenir.\nForma de pago: 60% entrega inicial y saldo contra entrega.");

            const [nroRemision, setNroRemision] = useState("");
            const [remisionDatos, setRemisionDatos] = useState({
                fechaEmision: new Date().toISOString().split('T')[0],
                fechaTraslado: new Date().toISOString().split('T')[0],
                comprobanteVenta: "", 
                facturaManual: "",     
                motivoTraslado: "VENTA",
                conductorNombre: "",
                conductorRuc: "",
                vehiculoChapa: "",
                marcaVehiculo: "",
                puntoPartida: "LIONEL TELMO GONZÁLEZ ARCE LUQUE - PARAGUAY",
                puntoLlegada: ""
            });
            const [remisionItems, setRemisionItems] = useState([{
                id: Date.now(),
                descripcion: "",
                cantidad: 1,
                indigoMedida: "UNIDAD",
                pesoTotalKg: 0
            }]);

            const showMsg = (text) => { setMsg(text); setTimeout(() => setMsg(null), 5000); };

            const generarNro = (lista) => {
                const year = new Date().getFullYear();
                const prefix = `PR-${year}.`;
                const filtrados = lista.filter(b => b.nroPresupuesto?.startsWith(prefix));
                let maxNum = 0;
                filtrados.forEach(b => {
                    const parts = b.nroPresupuesto.split('.');
                    if (parts.length > 1) {
                        const num = parseInt(parts[1]);
                        if (!isNaN(num) && num > maxNum) maxNum = num;
                    }
                });
                return `${prefix}${(maxNum + 1).toString().padStart(4, '0')}`;
            };

            const generarNroRemision = (lista) => {
                const prefix = "001-001-";
                let maxNum = 0;
                lista.forEach(r => {
                    if (r.nroRemision?.startsWith(prefix)) {
                        const numStr = r.nroRemision.replace(prefix, "");
                        const num = parseInt(numStr);
                        if (!isNaN(num) && num > maxNum) maxNum = num;
                    }
                });
                return `${prefix}${(maxNum + 1).toString().padStart(7, '0')}`;
            };

            useEffect(() => {
                const unsubscribeAuth = auth.onAuthStateChanged((firebaseUser) => {
                    if (firebaseUser) {
                        setUser(firebaseUser);
                        setStatus("online");
                    } else {
                        setUser(null);
                        setStatus("offline");
                    }
                });
                return () => unsubscribeAuth();
            }, []);

            useEffect(() => {
                if (!user) return;
                
                const unsubConfig = db.collection('artifacts').doc(APP_ID).collection('public').doc('config_empresa').onSnapshot(doc => {
                    if (doc.exists) {
                        const d = doc.data();
                        setEmpresa(prev => ({
                            nombre: d.nombre || prev.nombre,
                            ruc: d.ruc || prev.ruc,
                            direccion: d.direccion || prev.direccion,
                            telefono: d.telefono || prev.telefono,
                            email: d.email || prev.email,
                            logoUrl: d.logoUrl || ""
                        }));
                    }
                });

                const path = `artifacts/${APP_ID}/public/data/presupuestos`;
                const unsub = db.collection(path).onSnapshot(snap => {
                    const docs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setSavedBudgets(docs.sort((a,b) => (b.updatedAt || 0) - (a.updatedAt || 0)));
                }, () => setStatus("offline"));

                const unsubC = db.collection(`artifacts/${APP_ID}/public/data/clientes`).onSnapshot(snap => {
                    setSavedClients(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                const unsubR = db.collection(`artifacts/${APP_ID}/public/data/remisiones`).onSnapshot(snap => {
                    const docs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setSavedRemisiones(docs.sort((a,b) => (b.updatedAt || 0) - (a.updatedAt || 0)));
                });

                // NUEVA CONEXIÓN: Base de datos de Empresas para Autocompletado
                const unsubE = db.collection(`artifacts/${APP_ID}/public/data/empresas`).onSnapshot(snap => {
                    setSavedEmpresas(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                return () => { unsubConfig(); unsub(); unsubC(); unsubR(); unsubE(); };
            }, [user]);

            useEffect(() => {
                if (savedBudgets.length > 0 && !nroPresupuesto) {
                    setNroPresupuesto(generarNro(savedBudgets));
                }
            }, [savedBudgets]);

            useEffect(() => {
                if (savedRemisiones.length > 0 && !nroRemision) {
                    setNroRemision(generarNroRemision(savedRemisiones));
                }
            }, [savedRemisiones]);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoginError("");
                try {
                    const cred = await auth.signInWithEmailAndPassword(loginEmail, loginPassword);
                    setUser(cred.user);
                    setStatus("online");
                    showMsg("🔓 Sesión Iniciada");
                } catch (err) {
                    setLoginError("Acceso denegado. Revisa tu configuración en Firebase.");
                }
            };

            const handleLogout = () => {
                auth.signOut().then(() => {
                    setUser(null);
                    setStatus("offline");
                });
            };

            const guardandoConfigEmpresa = async (e) => {
                e.preventDefault();
                try {
                    // Guardamos la empresa activa en el config general
                    await db.collection('artifacts').doc(APP_ID).collection('public').doc('config_empresa').set(empresa);
                    
                    // Almacenamos/Actualizamos la empresa en el listado histórico de selección (Opción B)
                    if (empresa.nombre) {
                        const empId = empresa.nombre.replace(/\s+/g, '-').toLowerCase();
                        await db.doc(`artifacts/${APP_ID}/public/data/empresas/${empId}`).set({ ...empresa, updatedAt: Date.now() });
                    }
                    
                    showMsg("💼 Datos de Empresa Guardados");
                } catch(err) { showMsg("❌ Error al guardar datos"); }
            };

            const suggestedClients = useMemo(() => {
                if (!cliente.nombre || cliente.nombre.length < 1) return [];
                return savedClients.filter(c => c.nombre.toLowerCase().includes(cliente.nombre.toLowerCase())).slice(0, 5);
            }, [cliente.nombre, savedClients]);
            
            // FILTRO INTELIGENTE DE EMPRESAS
            const suggestedEmpresas = useMemo(() => {
                if (!empresa.nombre || empresa.nombre.length < 1) return savedEmpresas;
                return savedEmpresas.filter(e => e.nombre?.toLowerCase().includes(empresa.nombre.toLowerCase()));
            }, [empresa.nombre, savedEmpresas]);

            const groupedBudgets = useMemo(() => {
                return savedBudgets.reduce((acc, b) => {
                    const folder = b.cliente?.nombre || "Sin Nombre";
                    if (!acc[folder]) acc[folder] = [];
                    acc[folder].push(b);
                    return acc;
                }, {});
            }, [savedBudgets]);

            const groupedRemisiones = useMemo(() => {
                return savedRemisiones.reduce((acc, r) => {
                    const folder = r.cliente?.nombre || "Sin Nombre";
                    if (!acc[folder]) acc[folder] = [];
                    acc[folder].push(r);
                    return acc;
                }, {});
            }, [savedRemisiones]);

            const totales = useMemo(() => {
                let totalVenta = 0;
                let totalCostoReal = 0;

                items.forEach(item => {
                    const cant = Number(item.cantidad) || 0;
                    totalVenta += cant * (Number(item.precioUnitario) || 0);
                    
                    const costoMat = (Number(item.pesoKg) || 0) * (Number(item.precioKg) || 0);
                    const costoMO = (Number(item.diasTrabajados) || 0) * (Number(item.costoDia) || 0);
                    const costoItem = costoMat + costoMO + (Number(item.insumos) || 0);
                    totalCostoReal += cant * costoItem;
                });

                const neto = Math.round(totalVenta / 1.1);
                const iva = totalVenta - neto;

                return { neto, iva, total: totalVenta, costoTotal: totalCostoReal, margenActual: totalVenta > 0 ? ((totalVenta - totalCostoReal) / totalVenta) * 100 : 0 };
            }, [items]);

            const metricasDashboard = useMemo(() => {
                let aprobados = 0;
                let pendientes = 0;
                let rechazados = 0;
                let dineroTotal = 0;

                savedBudgets.forEach(b => {
                    dineroTotal += Number(b.total) || 0;
                    if (b.estado === 'aprobado') aprobados++;
                    else if (b.estado === 'rechazado') rechazados++;
                    else pendientes++;
                });

                const efectividad = savedBudgets.length > 0 ? (aprobados / savedBudgets.length) * 100 : 0;

                return { aprobados, pendientes, rechazados, totalProyectos: savedBudgets.length, dineroTotal, efectividad, totalRemisiones: savedRemisiones.length };
            }, [savedBudgets, savedRemisiones]);

            const executeSave = async (targetNro) => {
                try {
                    const docId = targetNro.replace(/\s+/g, '-').toLowerCase();
                    await db.doc(`artifacts/${APP_ID}/public/data/presupuestos/${docId}`).set({
                        empresa, nroPresupuesto: targetNro, estado, cliente, items, condiciones, 
                        updatedAt: Date.now(), total: totales.total, costoTotal: totales.costoTotal 
                    });
                    const clientId = cliente.nombre.replace(/\s+/g, '-').toLowerCase();
                    await db.doc(`artifacts/${APP_ID}/public/data/clientes/${clientId}`).set({ ...cliente, updatedAt: Date.now() });
                    showMsg("✅ Guardado y Sincronizado");
                    setShowSaveConfirmModal(false);
                } catch (e) { showMsg("❌ Error Firebase"); } 
            };

            const executeSaveRemision = async () => {
                try {
                    const docId = nroRemision.replace(/\s+/g, '-').toLowerCase();
                    await db.doc(`artifacts/${APP_ID}/public/data/remisiones/${docId}`).set({
                        empresa, nroRemision, cliente, remisionDatos, items: remisionItems,
                        updatedAt: Date.now()
                    });
                    const clientId = cliente.nombre.replace(/\s+/g, '-').toLowerCase();
                    await db.doc(`artifacts/${APP_ID}/public/data/clientes/${clientId}`).set({ ...cliente, updatedAt: Date.now() });
                    showMsg("✅ Nota de Remisión Guardada");
                } catch (e) { showMsg("❌ Error Firebase"); }
            };

            const registrarItemVenta = (presu) => {
                setCliente(presu.cliente);
                setRemisionDatos(prev => ({
                    ...prev,
                    puntoLlegada: presu.cliente.direccion || "",
                    comprobanteVenta: presu.nroPresupuesto || ""
                }));
                const nuevosItems = presu.items.map(it => ({
                    id: Date.now() + Math.random(),
                    descripcion: `${it.titulo} - ${it.detalles}`.substring(0, 100),
                    cantidad: it.cantidad,
                    indigoMedida: "UNIDAD",
                    pesoTotalKg: it.pesoKg * it.cantidad || 0
                }));
                setRemisionItems(nuevosItems);
                showMsg("✅ Datos importados de " + presu.nroPresupuesto);
            };

            const handleComprobanteVentaChange = (val) => {
                setRemisionDatos(prev => ({ ...prev, comprobanteVenta: val }));
                const presuEncontrado = savedBudgets.find(
                    b => b.nroPresupuesto.trim().toLowerCase() === val.trim().toLowerCase()
                );
                if (presuEncontrado) registrarItemVenta(presuEncontrado);
            };

            const handleFacturaManualChange = (val) => {
                setRemisionDatos(prev => ({ ...prev, facturaManual: val }));
                const remisionConFactura = savedRemisiones.find(
                    r => r.remisionDatos?.facturaManual?.trim().toLowerCase() === val.trim().toLowerCase()
                );
                if (remisionConFactura) {
                    setCliente(remisionConFactura.cliente);
                    setRemisionItems(remisionConFactura.items);
                    setRemisionDatos(prev => ({
                        ...prev,
                        puntoLlegada: remisionConFactura.cliente?.direccion || "",
                        conductorNombre: remisionConFactura.remisionDatos?.conductorNombre || "",
                        conductorRuc: remisionConFactura.remisionDatos?.conductorRuc || "",
                        vehiculoChapa: remisionConFactura.remisionDatos?.vehiculoChapa || "",
                        marcaVehiculo: remisionConFactura.remisionDatos?.marcaVehiculo || ""
                    }));
                    showMsg("⚡ Datos estirados desde Factura Manual " + val);
                }
            };

            return (
                <div className="min-h-screen pb-10 bg-[#131926] text-slate-200 flex flex-col items-center">
                    
                    {/* MENÚ SUPERIOR INDUSTRIAL CYBERPUNK */}
                    <nav className="w-full sticky top-0 z-50 bg-[#1e293b] border-b border-slate-700 px-6 py-2.5 no-print flex items-center justify-between shadow-[0_4px_20px_rgba(0,0,0,0.15)] font-black">
                        <div className="flex items-center gap-6">

                        {vistaActiva === 'historial' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 animate-fadeIn text-left">
                                
                                <div className="bg-[#1e293b] rounded-3xl border border-slate-700 p-6 shadow-xl flex flex-col max-h-[80vh]">
                                    <div className="border-b border-slate-700 pb-3 mb-4">
                                        <h3 className="text-xs text-cyan-400 uppercase tracking-widest font-mono flex items-center gap-2"><SafeIcon name="FolderOpen" size={14} /> // REGISTRO_BASE_PRESUPUESTOS</h3>
                                        <p className="text-[9px] text-slate-400 uppercase font-mono mt-0.5">Sincronización en caliente indexada por carpetas de clientes.</p>
                                    </div>
                                    <div className="flex-1 overflow-y-auto custom-scrollbar space-y-2 pr-1">
                                        {Object.entries(groupedBudgets).map(([folder, budgets]) => (
                                            <div key={folder} className="space-y-1">
                                                <button onClick={() => setOpenFolders(p => ({...p, [folder]: !p[folder]}))} className="w-full flex items-center justify-between p-3 bg-[#111827] hover:bg-slate-800 border border-slate-700 rounded-2xl transition-all">
                                                    <div className="flex items-center gap-2 truncate uppercase text-[11px] font-black text-slate-200"><SafeIcon name={openFolders[folder] ? "FolderOpen" : "Folder"} size={14} className="text-cyan-500" />{folder}</div>
                                                    <span className="text-[9px] bg-slate-900 border border-slate-700 px-2.5 py-0.5 rounded-full font-mono text-cyan-400 font-bold">{budgets.length}</span>
                                                </button>
                                                {openFolders[folder] && budgets.map(b => (
                                                    <div key={b.id} className="relative group/budgetItem">
                                                        <div onClick={() => { setNroPresupuesto(b.nroPresupuesto); setEstado(b.estado); setCliente(b.cliente); setItems(b.items); setCondiciones(b.condiciones); setVistaActiva('presupuestos'); window.scrollTo({top:0, behavior:'smooth'}); }} className={`ml-4 p-3 rounded-xl border border-slate-700 hover:border-cyan-500 cursor-pointer transition-all border-l-4 bg-[#131926] ${b.estado === 'aprobado' ? 'border-l-emerald-500' : b.estado === 'rechazado' ? 'border-l-rose-500' : 'border-l-amber-500'}`}>
                                                            <div className="flex justify-between items-center">
                                                                <p className="font-bold text-[10px] text-white uppercase font-mono tracking-tight">{b.nroPresupuesto}</p>
                                                                <span className={`text-[8px] px-2 py-0.5 rounded font-mono font-bold text-slate-950 uppercase ${b.estado === 'aprobado' ? 'bg-emerald-400' : b.estado === 'rechazado' ? 'bg-rose-400' : 'bg-amber-400'}`}>{b.estado}</span>
                                                            </div>
                                                            <p className="text-[11px] font-black text-cyan-400 font-mono mt-1">{formatMoneda(b.total)}</p>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="bg-[#1e293b] rounded-3xl border border-slate-700 p-6 shadow-xl flex flex-col max-h-[80vh]">
                                    <div className="border-b border-slate-700 pb-3 mb-4">
                                        <h3 className="text-xs text-amber-500 uppercase tracking-widest font-mono flex items-center gap-2"><SafeIcon name="Truck" size={14} /> // HISTORIAL_NOTAS_REMISIÓN</h3>
                                        <p className="text-[9px] text-slate-400 uppercase font-mono mt-0.5">Control de despachos y salidas físicas del taller.</p>
                                    </div>
                                    <div className="flex-1 overflow-y-auto custom-scrollbar space-y-2 pr-1">
                                        {Object.entries(groupedRemisiones).map(([folder, remisiones]) => (
                                            <div key={folder} className="space-y-1">
                                                <button onClick={() => setOpenRemisionesFolders(p => ({...p, [folder]: !p[folder]}))} className="w-full flex items-center justify-between p-3 bg-[#111827] hover:bg-slate-800 border border-slate-700 rounded-2xl transition-all">
                                                    <div className="flex items-center gap-2 truncate uppercase text-[11px] font-black text-slate-200"><SafeIcon name={openRemisionesFolders[folder] ? "FolderOpen" : "Folder"} size={14} className="text-amber-500" />{folder}</div>
                                                    <span className="text-[9px] bg-slate-900 border border-slate-700 px-2.5 py-0.5 rounded-full font-mono text-amber-400 font-bold">{remisiones.length}</span>
                                                </button>
                                                {openRemisionesFolders[folder] && remisiones.map(r => (
                                                    <div key={r.id} onClick={() => { setNroRemision(r.nroRemision); setCliente(r.cliente); setRemisionDatos(r.remisionDatos); setRemisionItems(r.items); setVistaActiva('remisiones'); window.scrollTo({top:0, behavior:'smooth'}); }} className="ml-4 p-3 rounded-xl border border-slate-700 hover:border-amber-500 cursor-pointer transition-all border-l-4 border-l-amber-500 bg-[#131926]">
                                                        <p className="font-bold text-[10px] text-white uppercase font-mono tracking-tight">{r.nroRemision}</p>
                                                        {r.remisionDatos?.facturaManual && <p className="text-[9px] text-emerald-400 font-mono uppercase mt-0.5">REF_FACTURA: {r.remisionDatos.facturaManual}</p>}
                                                        <p className="text-[9px] font-bold text-slate-400 uppercase tracking-tighter mt-1 font-mono">FECHA_SALIDA: {r.remisionDatos?.fechaEmision}</p>
                                                    </div>
                                                ))}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 🖥️ VISTA 5: CONFIGURACIÓN GLOBAL */}
                        {vistaActiva === 'configuracion' && (
                            <main className="bg-[#1e293b] rounded-3xl border border-slate-700 p-8 text-left shadow-2xl animate-fadeIn">
                                <div className="border-b border-slate-700 pb-4 mb-6">
                                    <h2 className="text-lg font-black text-white uppercase tracking-tight flex items-center gap-2 font-mono"><SafeIcon name="Sliders" size={18} className="text-cyan-400"/> // PARÁMETROS_CONFIG_SISTEMA</h2>
                                    <p className="text-[10px] text-slate-400 uppercase font-mono mt-1">Configuración del servidor de variables globales comerciales de la maestranza.</p>
                                </div>
                                <form onSubmit={guardandoConfigEmpresa} className="space-y-5 max-w-2xl font-black">
                                    
                                    {/* MÓDULO INTELIGENTE DE EMPRESAS (OPCIÓN B) */}
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="flex flex-col relative">
                                            <label className="text-[9px] text-slate-400 uppercase font-black mb-1 font-mono">NOMBRE_EMPRESA</label>
                                            <input 
                                                type="text" 
                                                className="cyber-input p-2.5 rounded-xl text-xs outline-none font-black" 
                                                value={empresa.nombre} 
                                                onFocus={() => setShowEmpresaList(true)}
                                                onChange={e => {
                                                    setEmpresa({...empresa, nombre: e.target.value.toUpperCase()});
                                                    setShowEmpresaList(true);
                                                }}
                                            />
                                            {showEmpresaList && savedEmpresas.length > 0 && (
                                                <div className="absolute top-full left-0 w-full mt-1 bg-[#1e293b] border border-slate-600 rounded-xl shadow-2xl z-50 overflow-hidden no-print">
                                                    {suggestedEmpresas.map(emp => (
                                                        <div key={emp.id} 
                                                             onClick={() => {
                                                                 setEmpresa({ 
                                                                     nombre: emp.nombre || "", 
                                                                     ruc: emp.ruc || "", 
                                                                     direccion: emp.direccion || "", 
                                                                     telefono: emp.telefono || "", 
                                                                     email: emp.email || "", 
                                                                     logoUrl: emp.logoUrl || "" 
                                                                 }); 
                                                                 setShowEmpresaList(false); 
                                                             }} 
                                                             className="p-3 hover:bg-slate-700 cursor-pointer border-b border-slate-800 last:border-0 transition-colors text-left flex items-center gap-3">
                                                             {emp.logoUrl ? (
                                                                 <img src={emp.logoUrl} className="w-8 h-8 object-contain rounded bg-slate-800 p-0.5 border border-slate-700" alt="logo" />
                                                             ) : (
                                                                 <div className="w-8 h-8 bg-slate-800 border border-slate-700 rounded flex items-center justify-center text-cyan-500"><SafeIcon name="Factory" size={14}/></div>
                                                             )}
                                                             <div>
                                                                 <p className="text-xs font-black text-white uppercase leading-tight">{emp.nombre}</p>
                                                                 <p className="text-[9px] text-slate-400 font-mono mt-0.5">RUC: {emp.ruc}</p>
                                                             </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                            {showEmpresaList && <div className="fixed inset-0 z-40 no-print" onClick={() => setShowEmpresaList(false)}></div>}
                                        </div>
                                        
                                        <div className="flex flex-col"><label className="text-[9px] text-slate-400 uppercase font-black mb-1 font-mono">RUC_EMPRESA</label><input type="text" className="cyber-input p-2.5 rounded-xl text-xs outline-none font-mono" value={empresa.ruc} onChange={e => setEmpresa({...empresa, ruc: e.target.value})}/></div>
                                    </div>

                                    <div className="flex flex-col"><label className="text-[9px] text-slate-400 uppercase font-black mb-1 font-mono">DIRECCIÓN_PLANTA_CENTRAL</label><input type="text" className="cyber-input p-2.5 rounded-xl text-xs outline-none font-black" value={empresa.direccion} onChange={e => setEmpresa({...empresa, direccion: e.target.value.toUpperCase()})}/></div>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="flex flex-col"><label className="text-[9px] text-slate-400 uppercase font-black mb-1 font-mono">LÍNEA_COMUNICACIÓN</label><input type="text" className="cyber-input p-2.5 rounded-xl text-xs outline-none font-mono" value={empresa.telefono} onChange={e => setEmpresa({...empresa, telefono: e.target.value})}/></div>
                                        <div className="flex flex-col"><label className="text-[9px] text-slate-400 uppercase font-black mb-1 font-mono">CORREO_SMTP_SERVER</label><input type="text" className="cyber-input p-2.5 rounded-xl text-xs outline-none font-mono" value={empresa.email} onChange={e => setEmpresa({...empresa, email: e.target.value.toUpperCase()})}/></div>
                                    </div>
                                    
                                    <div className="flex flex-col border-t border-slate-700 pt-4">
                                        <label className="text-[9px] text-slate-400 uppercase font-black mb-1 flex items-center gap-1 font-mono"><SafeIcon name="Image" size={10} className="text-cyan-400"/> URL_ENLACE_LOGO_MARCA</label>
                                        <input type="text" className="cyber-input p-2.5 rounded-xl text-xs outline-none text-cyan-600 font-mono" value={empresa.logoUrl || ""} onChange={e => setEmpresa({...empresa, logoUrl: e.target.value})} placeholder="https://ejemplo.com/logo.png"/>
                                        <p className="text-[8px] text-slate-400 uppercase font-mono mt-1.5">Inyección directa de enlace de imagen en formato crudo (PNG o JPG) para renderizado en remisiones e informes impresos.</p>
                                    </div>
                                    
                                    <button type="submit" className="bg-cyan-600 hover:bg-cyan-500 text-white px-6 py-3 rounded-xl text-xs font-black uppercase tracking-wider font-mono shadow-[0_0_15px_rgba(6,182,212,0.2)] transition-all">CONFIRMAR_CAMBIOS_SERVIDOR</button>
                                </form>
                            </main>
                        )}
                    </div>

                    {/* MODAL DE ADVERTENCIA */}
                    {showSaveConfirmModal && (
                        <div className="fixed inset-0 z-[110] bg-slate-950/80 backdrop-blur-md flex items-center justify-center p-6 no-print font-black">
                            <div className="bg-[#1e293b] p-8 rounded-[2.5rem] border-2 border-slate-600 shadow-2xl max-w-md w-full text-center space-y-6">
                                <div className="w-16 h-16 bg-amber-950/40 border border-amber-500/20 text-amber-500 rounded-full flex items-center justify-center mx-auto shadow-[0_0_15px_rgba(245,158,11,0.1)]"><SafeIcon name="AlertCircle" size={32}/></div>
                                <div><h3 className="font-black text-white uppercase text-sm tracking-widest font-mono">REGISTRO_YA_EXISTENTE</h3><p className="text-[10px] text-slate-400 font-bold mt-2 uppercase font-mono leading-relaxed">¿Deseas sobreescribir y actualizar el presupuesto {nroPresupuesto} o guardar como una nueva copia secuencial?</p></div>
                                <div className="grid grid-cols-1 gap-3 font-black font-mono">
                                    <button onClick={() => executeSave(nroPresupuesto)} className="py-4 bg-cyan-600 text-white rounded-xl text-[10px] font-black uppercase tracking-wider">SOBREESCRIBIR_REGISTRO</button>
                                    <button onClick={() => executeSave(generarNro(savedBudgets))} className="py-4 bg-slate-800 border border-slate-700 text-white rounded-xl text-[10px] font-black uppercase tracking-wider">GENERAR_NUEVA_COPIA</button>
                                    <button onClick={() => setShowSaveConfirmModal(false)} className="py-2 text-[10px] font-black text-slate-400 tracking-widest">ABORTAR_OPERACIÓN</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
